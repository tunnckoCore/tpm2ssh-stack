[package]
name = "tpmctl-core"
version = "0.1.0"
edition = "2024"
description = "Reusable TPM and registry core for tpmctl"
license = "Apache-2.0"

[workspace]

[features]
default = []
tss-esapi = ["dep:tss-esapi"]

[dependencies]
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
thiserror = "2.0.17"
tss-esapi = { version = "7.6.0", optional = true }

[dev-dependencies]
tempfile = "3.27.0"
