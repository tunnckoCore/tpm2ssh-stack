[package]
name = "tpmctl-cli"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "tpmctl"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive", "env"] }
is-terminal = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tpmctl-core = { path = "../tpmctl-core" }

[dev-dependencies]
tempfile = "3"

[workspace]
